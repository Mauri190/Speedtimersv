<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedtimer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scramble-display {
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        
        .timer-display {
            font-family: monospace;
        }
        
        @keyframes pulse {
            0% { background-color: rgba(255, 255, 255, 0.1); }
            50% { background-color: rgba(255, 255, 255, 0.3); }
            100% { background-color: rgba(255, 255, 255, 0.1); }
        }
        
        .ready-state {
            animation: pulse 1.5s infinite;
        }
        
        .time-entry:nth-child(odd) {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        /* WCA Categories */
        .category-btn.active {
            background-color: #3b82f6;
            color: white;
        }
        
        .scramble-type {
            background-color: #1e293b;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .delete-btn {
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .time-entry:hover .delete-btn {
            opacity: 1;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-center mb-8 text-yellow-400">Speedtimer</h1>
        
        <!-- WCA Categories -->
        <div class="flex flex-wrap justify-center gap-2 mb-8">
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition active" data-category="333">3x3x3</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="222">2x2x2</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="444">4x4x4</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="555">5x5x5</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="666">6x6x6</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="777">7x7x7</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="333bf">3x3x3 BLD</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="333fm">3x3x3 FM</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="333oh">3x3x3 OH</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="clock">Clock</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="minx">Megaminx</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="pyram">Pyraminx</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="skewb">Skewb</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="sq1">Square-1</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="444bf">4x4x4 BLD</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="555bf">5x5x5 BLD</button>
            <button class="category-btn px-4 py-2 bg-gray-700 rounded-lg font-medium hover:bg-gray-600 transition" data-category="333mbf">3x3x3 MBLD</button>
        </div>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Timer Section -->
            <div class="flex-1 flex flex-col items-center">
                <div class="timer-display text-7xl md:text-8xl font-bold mb-8 text-center" id="timer">0.00</div>
                
                <div class="w-full max-w-md h-32 md:h-48 bg-gray-800 rounded-xl flex items-center justify-center mb-8 cursor-pointer"
                     id="timer-touch-area">
                    <div class="text-xl text-gray-400" id="timer-instruction">Toca la pantalla o presiona espacio para comenzar</div>
                </div>
                
                <div class="flex gap-4 mb-8">
                    <button class="px-6 py-3 bg-red-600 rounded-lg font-semibold hover:bg-red-700 transition" id="reset-btn">
                        <i class="fas fa-undo mr-2"></i>Reiniciar
                    </button>
                    <button class="px-6 py-3 bg-blue-600 rounded-lg font-semibold hover:bg-blue-700 transition" id="new-scramble-btn">
                        <i class="fas fa-random mr-2"></i>Nuevo Scramble
                    </button>
                </div>
                
                <!-- Stats -->
                <div class="w-full max-w-4xl bg-gray-800 rounded-xl p-4 mb-8">
                    <h3 class="text-xl font-semibold mb-4 text-center">Estadísticas</h3>
                    <div class="stats-grid text-center">
                        <div>
                            <div class="text-sm text-gray-400">Actual</div>
                            <div class="text-2xl font-bold" id="current-time">-</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Mejor</div>
                            <div class="text-2xl font-bold" id="best-time">-</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Avg5</div>
                            <div class="text-2xl font-bold" id="avg5-time">-</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Avg12</div>
                            <div class="text-2xl font-bold" id="avg12-time">-</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Avg50</div>
                            <div class="text-2xl font-bold" id="avg50-time">-</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Avg100</div>
                            <div class="text-2xl font-bold" id="avg100-time">-</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Avg1000</div>
                            <div class="text-2xl font-bold" id="avg1000-time">-</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Scramble Section -->
            <div class="flex-1">
                <div class="bg-gray-800 rounded-xl p-6 mb-8">
                    <div class="scramble-type text-center mb-4">
                        <span id="current-category">3x3x3</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-4 text-center">Scramble</h3>
                    <div class="scramble-display bg-gray-700 p-4 rounded-lg mb-4 text-center text-lg" id="scramble"></div>
                </div>
                
                <!-- Times History -->
                <div class="bg-gray-800 rounded-xl p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-semibold">Historial de Tiempos</h3>
                        <button id="clear-times" class="text-sm text-red-400 hover:text-red-300">
                            <i class="fas fa-trash mr-1"></i>Borrar todo
                        </button>
                    </div>
                    <div class="max-h-96 overflow-y-auto" id="times-list">
                        <div class="text-center text-gray-500 py-4">No hay tiempos registrados</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Variables
            let timerInterval;
            let startTime;
            let running = false;
            let ready = false;
            let times = JSON.parse(localStorage.getItem('speedcube-times')) || [];
            let currentScramble = generateScramble('333');
            let currentCategory = '333';
            
            // DOM Elements
            const timerDisplay = document.getElementById('timer');
            const timerTouchArea = document.getElementById('timer-touch-area');
            const timerInstruction = document.getElementById('timer-instruction');
            const scrambleDisplay = document.getElementById('scramble');
            const resetBtn = document.getElementById('reset-btn');
            const newScrambleBtn = document.getElementById('new-scramble-btn');
            const currentTimeDisplay = document.getElementById('current-time');
            const bestTimeDisplay = document.getElementById('best-time');
            const avg5TimeDisplay = document.getElementById('avg5-time');
            const avg12TimeDisplay = document.getElementById('avg12-time');
            const avg50TimeDisplay = document.getElementById('avg50-time');
            const avg100TimeDisplay = document.getElementById('avg100-time');
            const avg1000TimeDisplay = document.getElementById('avg1000-time');
            const timesList = document.getElementById('times-list');
            const clearTimesBtn = document.getElementById('clear-times');
            const categoryBtns = document.querySelectorAll('.category-btn');
            const currentCategoryDisplay = document.getElementById('current-category');
            
            // Initialize
            updateScrambleDisplay();
            updateStats();
            renderTimesList();
            
            // Event Listeners
            document.addEventListener('keydown', handleKeyPress);
            timerTouchArea.addEventListener('touchstart', handleTouchStart);
            timerTouchArea.addEventListener('mousedown', handleTouchStart);
            resetBtn.addEventListener('click', resetTimer);
            newScrambleBtn.addEventListener('click', () => generateNewScramble(currentCategory));
            clearTimesBtn.addEventListener('click', clearAllTimes);
            
            // Category selection
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // Update active button
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Update current category
                    currentCategory = this.dataset.category;
                    currentCategoryDisplay.textContent = getCategoryName(currentCategory);
                    
                    // Generate new scramble for this category
                    generateNewScramble(currentCategory);
                });
            });
            
            // Functions
            function handleKeyPress(e) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleTimerAction();
                }
            }
            
            function handleTouchStart(e) {
                e.preventDefault();
                handleTimerAction();
            }
            
            function handleTimerAction() {
                if (!running && !ready) {
                    // First press - get ready
                    ready = true;
                    timerTouchArea.classList.add('ready-state');
                    timerInstruction.textContent = 'Mantén presionado hasta que el cubo esté resuelto';
                } else if (ready && !running) {
                    // Second press - start timer
                    startTimer();
                } else if (running) {
                    // Press while running - stop timer
                    stopTimer();
                }
            }
            
            function startTimer() {
                running = true;
                ready = false;
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 10);
                timerTouchArea.classList.remove('ready-state');
                timerInstruction.textContent = 'Presiona para detener';
                timerTouchArea.classList.add('bg-gray-700');
            }
            
            function stopTimer() {
                running = false;
                clearInterval(timerInterval);
                timerTouchArea.classList.remove('bg-gray-700');
                
                const endTime = Date.now();
                const elapsedTime = (endTime - startTime) / 1000;
                
                // Save time
                const timeEntry = {
                    time: elapsedTime,
                    scramble: currentScramble,
                    date: new Date().toISOString(),
                    category: currentCategory
                };
                
                times.unshift(timeEntry);
                if (times.length > 1000) times = times.slice(0, 1000); // Limit to 1000 entries
                
                localStorage.setItem('speedcube-times', JSON.stringify(times));
                
                // Update UI
                updateStats();
                renderTimesList();
                
                // Generate new scramble
                generateNewScramble(currentCategory);
                
                timerInstruction.textContent = 'Toca la pantalla o presiona espacio para comenzar';
            }
            
            function resetTimer() {
                running = false;
                ready = false;
                clearInterval(timerInterval);
                timerDisplay.textContent = '0.00';
                timerTouchArea.classList.remove('ready-state', 'bg-gray-700');
                timerInstruction.textContent = 'Toca la pantalla o presiona espacio para comenzar';
            }
            
            function updateTimer() {
                const elapsedTime = (Date.now() - startTime) / 1000;
                timerDisplay.textContent = elapsedTime.toFixed(2);
            }
            
            function generateScramble(category) {
                // Default to 3x3x3 scramble
                if (category === '333' || !category) {
                    const moves = ["U", "U'", "U2", "D", "D'", "D2", 
                                  "F", "F'", "F2", "B", "B'", "B2",
                                  "R", "R'", "R2", "L", "L'", "L2"];
                    return generateRandomScramble(moves, 20);
                }
                else if (category === '222') {
                    const moves = ["U", "U'", "U2", "F", "F'", "F2", "R", "R'", "R2"];
                    return generateRandomScramble(moves, 10);
                }
                else if (category === '444') {
                    const moves = ["U", "U'", "U2", "Uw", "Uw'", "Uw2",
                                  "D", "D'", "D2", "Dw", "Dw'", "Dw2",
                                  "F", "F'", "F2", "Fw", "Fw'", "Fw2",
                                  "B", "B'", "B2", "Bw", "Bw'", "Bw2",
                                  "R", "R'", "R2", "Rw", "Rw'", "Rw2",
                                  "L", "L'", "L2", "Lw", "Lw'", "Lw2"];
                    return generateRandomScramble(moves, 40);
                }
                else if (category === '555') {
                    const moves = ["U", "U'", "U2", "Uw", "Uw'", "Uw2",
                                  "D", "D'", "D2", "Dw", "Dw'", "Dw2",
                                  "F", "F'", "F2", "Fw", "Fw'", "Fw2",
                                  "B", "B'", "B2", "Bw", "Bw'", "Bw2",
                                  "R", "R'", "R2", "Rw", "Rw'", "Rw2",
                                  "L", "L'", "L2", "Lw", "Lw'", "Lw2"];
                    return generateRandomScramble(moves, 60);
                }
                else if (category === '666' || category === '777') {
                    return "Scramble demasiado largo para mostrar";
                }
                else if (category === '333bf' || category === '333oh') {
                    const moves = ["U", "U'", "U2", "D", "D'", "D2", 
                                  "F", "F'", "F2", "B", "B'", "B2",
                                  "R", "R'", "R2", "L", "L'", "L2"];
                    return generateRandomScramble(moves, 20);
                }
                else if (category === '333fm') {
                    return "Fewest Moves - Sin scramble generado";
                }
                else if (category === 'clock') {
                    const moves = ["UR", "UR'", "DR", "DR'", "DL", "DL'", "UL", "UL'",
                                  "U", "U'", "R", "R'", "D", "D'", "L", "L'", "ALL", "ALL'"];
                    return generateRandomScramble(moves, 10);
                }
                else if (category === 'minx') {
                    const moves = ["U", "U'", "R", "R'", "D", "D'"];
                    return generateRandomScramble(moves, 10);
                }
                else if (category === 'pyram') {
                    const moves = ["U", "U'", "L", "L'", "R", "R'", "B", "B'"];
                    return generateRandomScramble(moves, 10);
                }
                else if (category === 'skewb') {
                    const moves = ["U", "U'", "L", "L'", "R", "R'", "B", "B'"];
                    return generateRandomScramble(moves, 10);
                }
                else if (category === 'sq1') {
                    const moves = ["/", "(1,0)", "(-1,0)", "(0,1)", "(0,-1)"];
                    return generateRandomScramble(moves, 15);
                }
                else {
                    return "Scramble no disponible para esta categoría";
                }
            }
            
            function generateRandomScramble(moves, length) {
                const scramble = [];
                let lastMoveFace = '';
                
                for (let i = 0; i < length; i++) {
                    let move;
                    let moveFace;
                    let attempts = 0;
                    
                    do {
                        move = moves[Math.floor(Math.random() * moves.length)];
                        moveFace = move[0]; // Get the first character (face)
                        
                        // Avoid moves on the same face as the last one
                        if (attempts++ > 50) break; // Prevent infinite loops
                    } while (moveFace === lastMoveFace);
                    
                    scramble.push(move);
                    lastMoveFace = moveFace;
                }
                
                return scramble.join(' ');
            }
            
            function generateNewScramble(category) {
                currentScramble = generateScramble(category);
                updateScrambleDisplay();
                resetTimer();
            }
            
            function updateScrambleDisplay() {
                scrambleDisplay.textContent = currentScramble;
            }
            
            function calculateAverage(times, count) {
                if (times.length < count) return null;
                
                const subset = times.slice(0, count);
                const sorted = [...subset].sort((a, b) => a.time - b.time);
                
                // Remove best and worst (for averages of 5 or more)
                let trimmed = subset;
                if (count >= 5) {
                    trimmed = sorted.slice(1, -1);
                }
                
                const sum = trimmed.reduce((acc, t) => acc + t.time, 0);
                return sum / trimmed.length;
            }
            
            function updateStats() {
                // Filter times by current category
                const categoryTimes = times.filter(t => t.category === currentCategory);
                
                if (categoryTimes.length === 0) {
                    currentTimeDisplay.textContent = '-';
                    bestTimeDisplay.textContent = '-';
                    avg5TimeDisplay.textContent = '-';
                    avg12TimeDisplay.textContent = '-';
                    avg50TimeDisplay.textContent = '-';
                    avg100TimeDisplay.textContent = '-';
                    avg1000TimeDisplay.textContent = '-';
                    return;
                }
                
                // Current time (last time)
                currentTimeDisplay.textContent = categoryTimes[0].time.toFixed(2);
                
                // Best time
                const bestTime = Math.min(...categoryTimes.map(t => t.time));
                bestTimeDisplay.textContent = bestTime.toFixed(2);
                
                // Averages
                const avg5 = calculateAverage(categoryTimes, 5);
                const avg12 = calculateAverage(categoryTimes, 12);
                const avg50 = calculateAverage(categoryTimes, 50);
                const avg100 = calculateAverage(categoryTimes, 100);
                const avg1000 = calculateAverage(categoryTimes, 1000);
                
                avg5TimeDisplay.textContent = avg5 ? avg5.toFixed(2) : '-';
                avg12TimeDisplay.textContent = avg12 ? avg12.toFixed(2) : '-';
                avg50TimeDisplay.textContent = avg50 ? avg50.toFixed(2) : '-';
                avg100TimeDisplay.textContent = avg100 ? avg100.toFixed(2) : '-';
                avg1000TimeDisplay.textContent = avg1000 ? avg1000.toFixed(2) : '-';
            }
            
            function renderTimesList() {
                // Filter times by current category
                const categoryTimes = times.filter(t => t.category === currentCategory);
                
                if (categoryTimes.length === 0) {
                    timesList.innerHTML = '<div class="text-center text-gray-500 py-4">No hay tiempos registrados</div>';
                    return;
                }
                
                timesList.innerHTML = '';
                
                categoryTimes.forEach((entry, index) => {
                    const timeEntry = document.createElement('div');
                    timeEntry.className = 'time-entry flex justify-between items-center p-3 border-b border-gray-700';
                    
                    timeEntry.innerHTML = `
                        <div class="flex items-center">
                            <span class="text-gray-400 mr-3">${index + 1}.</span>
                            <span class="font-mono">${entry.time.toFixed(2)}</span>
                        </div>
                        <div class="flex items-center">
                            <span class="text-sm text-gray-400 mr-3">${new Date(entry.date).toLocaleString()}</span>
                            <button class="delete-btn text-red-400 hover:text-red-300" data-index="${index}">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                    
                    timesList.appendChild(timeEntry);
                });
                
                // Add event listeners to delete buttons
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const index = parseInt(this.getAttribute('data-index'));
                        deleteTimeEntry(index);
                    });
                });
            }
            
            function deleteTimeEntry(index) {
                // Filter times by current category to get correct index
                const categoryTimes = times.filter(t => t.category === currentCategory);
                const globalIndex = times.findIndex(t => t === categoryTimes[index]);
                
                if (globalIndex !== -1) {
                    times.splice(globalIndex, 1);
                    localStorage.setItem('speedcube-times', JSON.stringify(times));
                    updateStats();
                    renderTimesList();
                }
            }
            
            function clearAllTimes() {
                if (confirm('¿Estás seguro de que quieres borrar todos los tiempos?')) {
                    times = times.filter(t => t.category !== currentCategory);
                    localStorage.setItem('speedcube-times', JSON.stringify(times));
                    updateStats();
                    renderTimesList();
                }
            }
            
            function getCategoryName(category) {
                const names = {
                    '333': '3x3x3',
                    '222': '2x2x2',
                    '444': '4x4x4',
                    '555': '5x5x5',
                    '666': '6x6x6',
                    '777': '7x7x7',
                    '333bf': '3x3x3 BLD',
                    '333fm': '3x3x3 FM',
                    '333oh': '3x3x3 OH',
                    'clock': 'Clock',
                    'minx': 'Megaminx',
                    'pyram': 'Pyraminx',
                    'skewb': 'Skewb',
                    'sq1': 'Square-1',
                    '444bf': '4x4x4 BLD',
                    '555bf': '5x5x5 BLD',
                    '333mbf': '3x3x3 MBLD'
                };
                return names[category] || category;
            }
        });
    </script>
</body>
</html>
